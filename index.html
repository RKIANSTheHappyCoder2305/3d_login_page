<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glass Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            overflow: hidden;
        }
        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 210, 255, 0.4);
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: rgba(255, 0, 255, 0.3);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        .login-card {
            position: relative;
            width: 400px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            text-align: center;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .login-card h2 {
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            transform: translateZ(50px); 
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
            transform: translateZ(30px);
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .input-group label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -12px;
            left: 10px;
            font-size: 0.8rem;
            color: #00d2ff;
            background: #24243e;
            padding: 0 10px;
            border-radius: 5px;
        }

        .btn-3d {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #00d2ff, #9d50bb);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            transform: translateZ(40px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-3d:hover {
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            letter-spacing: 2px;
        }

        .footer-text {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            transform: translateZ(20px);
        }

        .footer-text a {
            color: #00d2ff;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="login-card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
        <h2>LOGIN</h2>
        <form action="#">
            <div class="input-group">
                <input type="text" required>
                <label>Username</label>
            </div>
            
            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button type="submit" class="btn-3d">PROCEED</button>

            <div class="footer-text">
                Forgot password? <a href="#">Click here</a> <br><br>
                Don't have an account? <a href="#">Sign Up</a>
            </div>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
</body>
</html>
